services:
  postgres:
    image: postgres:16-alpine
    container_name: inspection_app_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inspection_app
    ports:
      - "5432:5432"
    volumes:
      - inspection_app_pgdata:/var/lib/postgresql/data

volumes:
  inspection_app_pgdata:
